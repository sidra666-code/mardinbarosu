<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görsel Sayfası</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Kaydırma çubuklarını gizler */
            background-color: black; /* Fotoğraf yüklenene kadar siyah görünsün */
        }

        .full-screen-img {
            width: 100%;
            height: 100vh;
            background-image: url('foto1.png');
            background-size: cover;    /* Fotoğrafı ekranı dolduracak şekilde büyütür */
            background-position: center; /* Fotoğrafı ortalar */
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>

    <div class="full-screen-img"></div>

</body>
</html>
