<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Açılış Sayfası</title>
    <style>
        /* Tüm boşlukları sıfırla */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Arkaplan görselini buraya ekliyoruz */
        body, html {
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
        }

        .bg-image {
            /* Görseli buraya tanımlıyoruz */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('foto1.png');
            
            /* Görselin ekranı tam kaplaması için ayarlar */
            height: 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            
            /* İçeriği ortalamak için flex kullanıyoruz */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Yazı stilleri */
        .content {
            color: white;
        }

        .content h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .content p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="bg-image">
        <div class="content">
            <h1>Hoş Geldiniz</h1>
            <p>Sizin için harika bir şey hazırlıyoruz.</p>
        </div>
    </div>

</body>
</html>
