<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tam Ekran Fotoğraf</title>
    <style>
        /* Sayfa kenarlarındaki boşlukları yok eder */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Kaydırma çubuklarını tamamen kaldırır */
            background-color: #000; /* Fotoğrafın dışında kalan boşluklar siyah görünsün */
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            /* Fotoğrafın enini ve boyunu bozmadan ekrana sığdırır */
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="foto1.png" alt="Açılış Fotoğrafı">
    </div>

</body>
</html>
